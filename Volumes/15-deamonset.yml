apiVersion: apps/v1
kind: DaemonSet  #deamonset will ensure that the pod is running on all the nodes in the cluster
metadata:
  name: log-agent
  namespace: roboshop

spec:
  selector:
    matchLabels:
      app: log-agent

  template:
    metadata:
      labels:
        app: log-agent

    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sh", "-c", "tail -f /var/log/syslog"]
          volumeMounts:
            - name: varlog
              mountPath: /var/log

      volumes:
        - name: varlog
          hostPath:
            path: /var/log             #this will mount the host's /var/log directory to the container's /var/log directory