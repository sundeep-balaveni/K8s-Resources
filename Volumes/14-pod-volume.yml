apiVersion: v1
kind: Namespace
metadata:
  name: roboshop
  labels:
    project: roboshop
    environment: dev
    purpose: poc

---

apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: roboshop
  labels:
    app: frontend

spec:
  containers: 
    - name: frontend
      image: nginx:latest
      ports:
        - containerPort: 80
      command: ["sh", "-c", "echo Hello World > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      volumeMounts:
        - name: frontend-logs
          mountPath: /var/log/nginx

    - name: frontend-sidecar
      image: busybox:latest
      command: ["sh", "-c", "tail -f /var/log/nginx/access.log"]
      volumeMounts:
        - name: frontend-logs
          mountPath: /var/log/nginx   

  volumes:
    - name: frontend-logs
      emptyDir: {}